services:

  nats-server:
    image: nats:latest
    container_name: nats-server
    platform: linux/amd64
    ports:
      - "4222:4222"
    restart: unless-stopped
    networks:
      - evolution-net
    env_file:
      - .env

  evolution:
    image: evoapicloud/evolution-go:latest
    container_name: evolution
    platform: linux/amd64
    ports:
      - "3000:3000"
    restart: unless-stopped
    volumes:
      - $HOME/dev/docker/volumes/evo-go/instances:/app/instances
    networks:
      - evolution-net
    env_file:
      - .env

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    platform: linux/amd64
    ports:
      - "5678:5678"
    restart: unless-stopped
    networks:
      - evolution-net
    env_file:
      - .env
    volumes:
      - $HOME/dev/docker/volumes/n8n_data:/home/node/.n8n

networks:
  evolution-net:
    name: evolution-net
    driver: bridge
